name: Collect IST flight data

on:
  schedule:
    - cron: "17 6 * * *" # daily ~06:17 UTC, collects yesterday's full UTC day
  workflow_dispatch:
    inputs:
      date:
        description: "UTC date YYYY-MM-DD (default: yesterday)"
        required: false
      backfill:
        description: "extra days to backfill before the target date"
        required: false
        default: "0"

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Collect
        env:
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
          AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
        run: |
          ARGS=""
          [ -n "${{ inputs.date }}" ] && ARGS="--date ${{ inputs.date }}"
          [ "${{ inputs.backfill }}" != "0" ] && [ -n "${{ inputs.backfill }}" ] && ARGS="$ARGS --backfill ${{ inputs.backfill }}"
          python -m collector $ARGS

      - name: Commit data
        if: always() # a failed collection may still have saved weather/partial data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/summary.json
          git diff --cached --quiet || git commit -m "data: collect $(date -u +%F)"
          git push
