name: Collect IST flight data

on:
  schedule:
    # daily 18:45 UTC = 21:45 Istanbul. Two midnights must not be crossed even
    # with GitHub's 30-90+ min cron delay: UTC midnight (collector's day key,
    # bit us at 23:45→01:10) and ISTANBUL midnight at 21:00 UTC (aviationstack's
    # real-time feed rolls to the next local day, bit us at 20:30→21:11).
    # Flights departing after the run are captured as "scheduled" rows and get
    # actual times at next-day finalization, so running early costs nothing.
    - cron: "45 18 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "UTC date YYYY-MM-DD (default: yesterday)"
        required: false
      backfill:
        description: "extra days to backfill before the target date"
        required: false
        default: "0"

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Collect
        env:
          OPENSKY_PROXY_URL: ${{ secrets.OPENSKY_PROXY_URL }}
          OPENSKY_PROXY_KEY: ${{ secrets.OPENSKY_PROXY_KEY }}
          AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
        run: |
          ARGS=""
          [ -n "${{ inputs.date }}" ] && ARGS="--date ${{ inputs.date }}"
          [ "${{ inputs.backfill }}" != "0" ] && [ -n "${{ inputs.backfill }}" ] && ARGS="$ARGS --backfill ${{ inputs.backfill }}"
          python -m collector $ARGS

      - name: Commit data
        if: always() # a failed collection may still have saved weather/partial data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/summary.json
          git diff --cached --quiet || git commit -m "data: collect $(date -u +%F)"
          git push
